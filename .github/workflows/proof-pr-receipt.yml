name: proof-pr receipt

on:
  workflow_call:
    inputs:
      receipt_path:
        description: Path to the proof-pr receipt JSON in the caller checkout.
        required: false
        type: string
        default: proof-pr.json
      proof_pr_ref:
        description: proof-pr git ref to install.
        required: false
        type: string
        default: main
      artifact_name:
        description: Uploaded artifact name for the proof bundle.
        required: false
        type: string
        default: proof-pr
      artifact_glob:
        description: Optional shell glob for additional proof artifacts.
        required: false
        type: string
        default: proof-pr-artifacts/**
      proof_summary_filename:
        description: Filename for the rendered proof block inside the uploaded artifact bundle.
        required: false
        type: string
        default: proof-pr-summary.md
      check_public_git_metadata:
        description: Fail when selected refs use non-noreply public git email metadata.
        required: false
        type: boolean
        default: false
      public_git_metadata_ref:
        description: Ref to inspect when check_public_git_metadata is true. Defaults to the workflow SHA.
        required: false
        type: string
        default: ""
      public_git_metadata_mode:
        description: Use full to scan selected refs and tags, or introduced to scan only base..ref commits.
        required: false
        type: string
        default: full
      public_git_metadata_base_ref:
        description: Base ref for introduced metadata checks. Defaults to the PR base or origin/main.
        required: false
        type: string
        default: ""
      receipt_hygiene:
        description: Write receipt hygiene suggestions to the job summary.
        required: false
        type: boolean
        default: true
      receipt_hygiene_strict:
        description: Fail the workflow when receipt hygiene warnings are present.
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      receipt_path:
        description: Path to the proof-pr receipt JSON in this checkout.
        required: false
        type: string
        default: proof-pr.json
      proof_pr_ref:
        description: proof-pr git ref to install.
        required: false
        type: string
        default: main
      artifact_name:
        description: Uploaded artifact name for the proof bundle.
        required: false
        type: string
        default: proof-pr
      artifact_glob:
        description: Optional shell glob for additional proof artifacts.
        required: false
        type: string
        default: proof-pr-artifacts/**
      proof_summary_filename:
        description: Filename for the rendered proof block inside the uploaded artifact bundle.
        required: false
        type: string
        default: proof-pr-summary.md
      check_public_git_metadata:
        description: Fail when selected refs use non-noreply public git email metadata.
        required: false
        type: boolean
        default: false
      public_git_metadata_ref:
        description: Ref to inspect when check_public_git_metadata is true. Defaults to the workflow SHA.
        required: false
        type: string
        default: ""
      public_git_metadata_mode:
        description: Use full to scan selected refs and tags, or introduced to scan only base..ref commits.
        required: false
        type: string
        default: full
      public_git_metadata_base_ref:
        description: Base ref for introduced metadata checks. Defaults to the PR base or origin/main.
        required: false
        type: string
        default: ""
      receipt_hygiene:
        description: Write receipt hygiene suggestions to the job summary.
        required: false
        type: boolean
        default: true
      receipt_hygiene_strict:
        description: Fail the workflow when receipt hygiene warnings are present.
        required: false
        type: boolean
        default: false

jobs:
  validate-receipt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install proof-pr
        run: python3 -m pip install "git+https://github.com/saagpatel/proof-pr.git@${{ inputs.proof_pr_ref }}"

      - name: Check public git metadata
        if: ${{ inputs.check_public_git_metadata }}
        env:
          PUBLIC_METADATA_REF: ${{ inputs.public_git_metadata_ref || github.sha }}
          PUBLIC_METADATA_MODE: ${{ inputs.public_git_metadata_mode }}
          PUBLIC_METADATA_BASE_REF: ${{ inputs.public_git_metadata_base_ref }}
          PUBLIC_METADATA_DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
          PUBLIC_METADATA_PR_BASE: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [ "$PUBLIC_METADATA_MODE" = "introduced" ]; then
            base_ref="$PUBLIC_METADATA_BASE_REF"
            if [ -z "$base_ref" ] && [ -n "$PUBLIC_METADATA_PR_BASE" ]; then
              base_ref="origin/$PUBLIC_METADATA_PR_BASE"
            fi
            if [ -z "$base_ref" ]; then
              base_ref="origin/$PUBLIC_METADATA_DEFAULT_BRANCH"
            fi
            proof-pr check-public-git-metadata --base-ref "$base_ref" --ref "$PUBLIC_METADATA_REF" --summary-format text
            tag_scope="skipped"
          elif [ "$PUBLIC_METADATA_MODE" = "full" ]; then
            proof-pr check-public-git-metadata --ref "$PUBLIC_METADATA_REF" --ref 'refs/tags/v*' --summary-format text
            base_ref="not_applicable"
            tag_scope="refs/tags/v*"
          else
            echo "invalid public_git_metadata_mode: $PUBLIC_METADATA_MODE" >&2
            exit 2
          fi
          {
            echo "## public git metadata"
            echo
            echo "- status: passed"
            echo "- mode: \`$PUBLIC_METADATA_MODE\`"
            echo "- ref: \`$PUBLIC_METADATA_REF\`"
            echo "- base_ref: \`$base_ref\`"
            echo "- tag_scope: \`$tag_scope\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate receipt
        env:
          RECEIPT_PATH: ${{ inputs.receipt_path }}
        run: proof-pr validate "$RECEIPT_PATH"

      - name: Receipt hygiene
        if: ${{ inputs.receipt_hygiene }}
        env:
          RECEIPT_PATH: ${{ inputs.receipt_path }}
          RECEIPT_HYGIENE_STRICT: ${{ inputs.receipt_hygiene_strict }}
        run: |
          set -euo pipefail
          args=("$RECEIPT_PATH")
          if [ "$RECEIPT_HYGIENE_STRICT" = "true" ]; then
            args+=("--strict")
          fi
          {
            echo "## receipt hygiene"
            echo
            hygiene_status=0
            proof-pr receipt-hygiene "${args[@]}" || hygiene_status=$?
            echo
            echo "### focused fixes"
            echo
            if proof-pr receipt-hygiene "$RECEIPT_PATH" --explain --check public-git-metadata --fix-only; then
              :
            else
              echo "_No focused public git metadata fix suggested._"
            fi
            exit "$hygiene_status"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Render proof summary
        env:
          RECEIPT_PATH: ${{ inputs.receipt_path }}
          PROOF_SUMMARY_FILENAME: ${{ inputs.proof_summary_filename }}
        run: |
          set -euo pipefail
          case "$PROOF_SUMMARY_FILENAME" in
            ""|*/*|*\\*)
              echo "invalid proof_summary_filename: $PROOF_SUMMARY_FILENAME" >&2
              exit 2
              ;;
          esac
          mkdir -p "$RUNNER_TEMP/proof-pr-upload"
          proof-pr render "$RECEIPT_PATH" --head-sha "${GITHUB_SHA}" > "$RUNNER_TEMP/proof-pr-upload/$PROOF_SUMMARY_FILENAME"
          {
            echo "## proof-pr"
            echo
            cat "$RUNNER_TEMP/proof-pr-upload/$PROOF_SUMMARY_FILENAME"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stage proof bundle
        env:
          RECEIPT_PATH: ${{ inputs.receipt_path }}
          ARTIFACT_GLOB: ${{ inputs.artifact_glob }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/proof-pr-upload"
          cp "$RECEIPT_PATH" "$RUNNER_TEMP/proof-pr-upload/"
          shopt -s globstar nullglob
          matches=( $ARTIFACT_GLOB )
          if [ "${#matches[@]}" -gt 0 ]; then
            mkdir -p "$RUNNER_TEMP/proof-pr-upload/artifacts"
            cp -R "${matches[@]}" "$RUNNER_TEMP/proof-pr-upload/artifacts/"
          fi

      - name: Upload proof bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ runner.temp }}/proof-pr-upload
          if-no-files-found: error
